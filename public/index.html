<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Tuition Australia — Student Check-in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
    }
    .logo-wrap img {
      width: 72px;
      height: 72px;
      border-radius: 18px;
    }

    /* ── Heading ── */
    .page-title {
      font-size: 26px;
      font-weight: 800;
      color: #0f172a;
      text-align: center;
      margin-bottom: 8px;
      line-height: 1.25;
      max-width: 380px;
    }
    .page-sub {
      font-size: 15px;
      color: #64748b;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
      max-width: 340px;
    }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px 32px 28px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e4ef;
      border-radius: 8px;
      font-size: 15px;
      color: #0f172a;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    input[type="email"]::placeholder { color: #b0b7c3; }
    input[type="email"]:focus { border-color: #2563eb; }

    .btn-submit {
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      font-family: inherit;
      letter-spacing: .2px;
    }
    .btn-submit:hover:not(:disabled) { background: #1d4ed8; }
    .btn-submit:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── Note box ── */
    .note-box {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      border-left: 3px solid #2563eb;
      background: #eff6ff;
      border-radius: 0 8px 8px 0;
    }
    .note-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
      color: #2563eb;
    }
    .note-text {
      font-size: 13px;
      color: #1e40af;
      line-height: 1.6;
    }
    .note-text strong { font-weight: 700; }

    /* ── Message (success / error) ── */
    .message {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }
    .message.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .message.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="/logo.png" alt="Apex Tuition Australia" onerror="this.style.display='none'" />
  </div>

  <h1 class="page-title">Apex Tuition Australia Student Check-in</h1>
  <p class="page-sub">Provide an update on all of your assigned students</p>

  <div class="card">
    <form id="loginForm">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="your.email@example.com" required />
      <button class="btn-submit" type="submit" id="submitBtn">Send Magic Link</button>
    </form>

    <div class="note-box">
      <span class="note-icon">ℹ</span>
      <div class="note-text">
        <strong>NOTE:</strong> You must use the same email that is connected to your Teachworks account.
        If you do not receive the magic link, please check your spam folder.
      </div>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    // Show error from query string (e.g. expired link)
    const params = new URLSearchParams(location.search);
    if (params.get('error')) {
      const msg = document.getElementById('message');
      msg.textContent = decodeURIComponent(params.get('error'));
      msg.className = 'message error';
      msg.style.display = 'block';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');

      btn.disabled = true;
      btn.textContent = 'Sending…';
      msg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/magic-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();

        if (res.ok) {
          msg.textContent = `Login link sent to ${email}. Check your inbox (and spam folder).`;
          msg.className = 'message success';
          document.getElementById('loginForm').reset();
        } else {
          msg.textContent = data.error || 'Something went wrong.';
          msg.className = 'message error';
        }
      } catch {
        msg.textContent = 'Network error. Please try again.';
        msg.className = 'message error';
      }

      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send Magic Link';
    });
  </script>
</body>
</html>
